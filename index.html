<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="output.css" />
    <script
      src="https://kit.fontawesome.com/39278c4f71.js"
      crossorigin="anonymous"
    ></script>
    <title>Currency Convertor</title>
  </head>
  <body class="bg-amber-100 flex justify-center align-middle font-serif">
    <main>
      <div
        class="h-80 w-80 relative top-34 bg-white rounded-2xl flex flex-col space-y-2 p-2"
      >
        <h2 id="heading" class="p-2 px-4 font-semibold text-xl">
          Currency Convertor
        </h2>
        <div id="inputArea" class="flex flex-col justify-center space-y-2 px-4">
          <label for="amount" class="text-sm">Enter Amount</label>
          <input
            type="number"
            id="amount"
            class="bg-white-300 border-zinc-600 border rounded-lg h-8 p-4"
          />
        </div>
        <div id="selection-container" class="flex justify-between px-4 mt-2">
          <div id="first" class="">
            <label for="from" class="text-sm font-medium">From</label>
            <br />
            <select id="from">
              <option>India</option>
              <option>Pakistan</option>
              <option>Indonesia</option>
            </select>
          </div>
          <div class="m-auto">
            <i class="fa-solid fa-arrow-right-arrow-left fa-xl"></i>
          </div>
          <div id="sec" class="">
            <label for="to" class="text-sm font-medium">To</label>
            <br />
            <select id="to">
              <option>India</option>
              <option>Pakistan</option>
              <option>Indonesia</option>
            </select>
          </div>
        </div>
        <div
          id="result"
          class="flex justify-start mx-6 mt-2 bg-pink-200 w-fit rounded-lg px-2"
        >
          <div id="input" class="mr-2">Hello</div>
          =
          <div id="ouput" class="ml-2">Hi</div>
        </div>
        <button
          id="getResult"
          class="bg-fuchsia-800 mx-6 mt-4 h-8 rounded-lg text-white"
        >
          Get Exchange Rate
        </button>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
